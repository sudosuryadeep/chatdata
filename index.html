<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotDesk — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Noto+Serif+JP:wght@200;300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#0a0a0f;--paper:#f5f3ef;--mist:#e8e4de;--smoke:#c9c3b8;
  --ash:#8a8278;--ghost:#4a4540;
  --sakura:#e8a0b0;--sakura2:#f2c4ce;--sakura-dim:rgba(232,160,176,.12);
  --indigo:#3d4a7a;--indigo-dim:rgba(61,74,122,.1);
  --font-jp:'Zen Kaku Gothic New',sans-serif;
  --font-serif:'Noto Serif JP',serif;
  --font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-jp);background:var(--paper);color:var(--ink);position:relative;}

/* ─── BACKGROUND ─── */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(10,10,15,.04) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(10,10,15,.04) 1px,transparent 1px);
  background-size:40px 40px;
}
.bg-circle{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,var(--sakura-dim) 0%,transparent 70%);
}
.c1{width:600px;height:600px;top:-200px;right:-100px;opacity:.6;}
.c2{width:400px;height:400px;bottom:-150px;left:-100px;opacity:.4;}
.c3{width:200px;height:200px;top:40%;left:15%;opacity:.3;}

/* petals */
.petal{
  position:absolute;width:8px;height:8px;border-radius:60% 40% 60% 40%;
  background:var(--sakura2);opacity:0;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0;}
  10%{opacity:.6;}
  90%{opacity:.3;}
  100%{transform:translateY(110vh) rotate(720deg) translateX(60px);opacity:0;}
}

/* ─── LAYOUT ─── */
.screen{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}

/* ─── CARD ─── */
.card{
  background:rgba(245,243,239,.88);
  backdrop-filter:blur(20px);
  border:1px solid rgba(201,195,184,.5);
  border-radius:2px;
  width:min(420px,94vw);
  padding:0;
  overflow:hidden;
  box-shadow:0 2px 40px rgba(10,10,15,.08),0 0 0 1px rgba(255,255,255,.6);
  animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}

.card-header{
  padding:32px 32px 0;
  display:flex;flex-direction:column;align-items:flex-start;
  border-bottom:1px solid var(--mist);margin-bottom:0;
}
.brand-mark{
  display:flex;align-items:center;gap:10px;margin-bottom:20px;
}
.brand-kanji{
  font-family:var(--font-serif);font-size:28px;font-weight:200;
  color:var(--ink);letter-spacing:-1px;line-height:1;
}
.brand-dot{width:5px;height:5px;border-radius:50%;background:var(--sakura);flex-shrink:0;}
.brand-sub{font-size:10px;font-weight:300;color:var(--ash);letter-spacing:3px;text-transform:uppercase;font-family:var(--font-mono);}

/* tabs */
.tabs{display:flex;gap:0;width:100%;margin-top:4px;}
.tab{
  flex:1;padding:10px 0;font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;font-family:var(--font-mono);
  color:var(--smoke);background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;transition:all .2s;
}
.tab.active{color:var(--ink);border-bottom-color:var(--ink);}
.tab:hover:not(.active){color:var(--ash);}
.tab.owner-tab.active{color:var(--sakura);border-bottom-color:var(--sakura);}

/* card body */
.card-body{padding:28px 32px 32px;}

/* form */
.field{margin-bottom:18px;}
.field-label{
  display:block;font-size:9px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--ash);margin-bottom:7px;font-family:var(--font-mono);
}
.input-wrap{position:relative;}
.field-input{
  width:100%;background:transparent;
  border:none;border-bottom:1.5px solid var(--mist);
  padding:8px 0 8px 0;font-size:13px;font-family:var(--font-mono);
  color:var(--ink);outline:none;transition:border-color .2s;
  border-radius:0;
}
.field-input:focus{border-bottom-color:var(--ink);}
.field-input::placeholder{color:var(--smoke);}
.input-wrap .eye{
  position:absolute;right:0;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--smoke);cursor:pointer;
  font-size:13px;transition:color .15s;padding:4px;
}
.input-wrap .eye:hover{color:var(--ash);}
.field-select{
  width:100%;background:transparent;border:none;
  border-bottom:1.5px solid var(--mist);
  padding:8px 0;font-size:13px;font-family:var(--font-mono);
  color:var(--ink);outline:none;cursor:pointer;appearance:none;
  transition:border-color .2s;
}
.field-select:focus{border-bottom-color:var(--ink);}
.field-select option{background:var(--paper);}

/* purpose grid */
.purpose-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;}
.pc{
  padding:10px 6px;border:1px solid var(--mist);border-radius:2px;
  cursor:pointer;text-align:center;transition:all .15s;background:transparent;
}
.pc:hover{border-color:var(--smoke);background:var(--mist);}
.pc.sel{border-color:var(--ink);background:var(--ink);}
.pc.sel .pc-label{color:var(--paper);}
.pc.sel .pc-icon{filter:grayscale(0) brightness(2);}
.pc-icon{font-size:18px;display:block;margin-bottom:3px;}
.pc-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ash);font-family:var(--font-mono);}

/* sb config */
.sb-toggle{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer;
  font-size:10px;color:var(--ash);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--font-mono);
  background:none;border:none;padding:0;
}
.sb-toggle .arr{transition:transform .2s;}
.sb-toggle.open .arr{transform:rotate(90deg);}
.sb-fields{display:none;}
.sb-fields.open{display:block;}

/* submit btn */
.submit{
  width:100%;margin-top:22px;padding:13px;
  background:var(--ink);border:none;border-radius:0;
  color:var(--paper);font-family:var(--font-mono);font-size:11px;
  font-weight:700;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.submit::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
  transform:translateX(-100%);transition:transform .4s;
}
.submit:hover::after{transform:translateX(100%);}
.submit:hover{background:var(--ghost);}
.submit:active{transform:scale(.99);}
.submit:disabled{opacity:.35;cursor:not-allowed;}
.submit.owner-btn{background:linear-gradient(135deg,#8b1a3a,#c4365a);letter-spacing:2px;}
.submit.owner-btn:hover{background:linear-gradient(135deg,#a01f45,#d4406a);}

/* error */
.err-box{
  margin-top:12px;padding:9px 12px;background:rgba(200,80,80,.08);
  border-left:2px solid rgba(200,80,80,.5);
  font-size:11px;color:#9b3a3a;font-family:var(--font-mono);display:none;
}
/* hint */
.hint{font-size:10px;color:var(--smoke);margin-top:14px;text-align:center;line-height:1.8;font-family:var(--font-mono);}
.hint a{color:var(--ash);text-decoration:none;border-bottom:1px solid var(--mist);}
.hint a:hover{color:var(--ink);}

/* loading spinner */
.spin-wrap{display:none;align-items:center;justify-content:center;gap:8px;margin-top:16px;}
.spin-wrap.show{display:flex;}
.dot-spin{width:4px;height:4px;border-radius:50%;background:var(--ash);animation:dotPulse 1.2s ease infinite;}
.dot-spin:nth-child(2){animation-delay:.2s;}
.dot-spin:nth-child(3){animation-delay:.4s;}
@keyframes dotPulse{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}

/* owner warning box */
.owner-warn{
  padding:10px 12px;background:rgba(232,160,176,.1);
  border-left:2px solid var(--sakura);
  font-size:10px;color:var(--ghost);font-family:var(--font-mono);
  line-height:1.8;margin-bottom:18px;
}

/* toast */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--ink);color:var(--paper);font-size:11px;font-family:var(--font-mono);
  letter-spacing:1px;padding:9px 20px;border-radius:0;z-index:999;
  transition:transform .3s cubic-bezier(.22,1,.36,1);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="bg-grid"></div>
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="bg-circle c3"></div>
  <!-- petals generated by JS -->
</div>

<div class="screen">
  <div class="card">
    <div class="card-header">
      <div class="brand-mark">
        <div class="brand-kanji">ボット</div>
        <div class="brand-dot"></div>
        <div>
          <div style="font-size:14px;font-weight:900;letter-spacing:-0.5px;">BotDesk</div>
          <div class="brand-sub">Telegram Dashboard</div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="tab" id="tab-reg" onclick="switchTab('reg')">Register</button>
        <button class="tab owner-tab" id="tab-owner" onclick="switchTab('owner')">Owner</button>
      </div>
    </div>

    <div class="card-body">

      <!-- LOGIN -->
      <div id="pane-login">
        <div class="field">
          <label class="field-label">Email</label>
          <input type="email" class="field-input" id="l-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <div class="input-wrap">
            <input type="password" class="field-input" id="l-pass" placeholder="••••••••" style="padding-right:24px;" onkeydown="if(event.key==='Enter')doLogin()">
            <button class="eye" onclick="toggleEye('l-pass')">○</button>
          </div>
        </div>
        <button class="submit" id="l-btn" onclick="doLogin()">Enter →</button>
        <div class="err-box" id="l-err"></div>
        <div class="spin-wrap" id="l-spin"><div class="dot-spin"></div><div class="dot-spin"></div><div class="dot-spin"></div></div>
        <div class="hint">Naya account? <a href="#" onclick="switchTab('reg');return false;">Register karo</a></div>
      </div>

      <!-- REGISTER -->
      <div id="pane-reg" style="display:none;">
        <div class="field">
          <label class="field-label">Full Name</label>
          <input type="text" class="field-input" id="r-name" placeholder="Rahul Sharma">
        </div>
        <div class="field">
          <label class="field-label">Email</label>
          <input type="email" class="field-input" id="r-email" placeholder="your@email.com">
        </div>
        <div class="field">
          <label class="field-label">Password</label>
          <div class="input-wrap">
            <input type="password" class="field-input" id="r-pass" placeholder="Min 6 chars" style="padding-right:24px;">
            <button class="eye" onclick="toggleEye('r-pass')">○</button>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Bot Token</label>
          <div class="input-wrap">
            <input type="password" class="field-input" id="r-token" placeholder="123456789:ABC..." style="padding-right:24px;" autocomplete="off">
            <button class="eye" onclick="toggleEye('r-token')">○</button>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Bot Purpose — Theme Select Karo</label>
          <div class="purpose-grid" id="pgrid">
            <div class="pc" data-p="support" data-theme="support" onclick="selPurpose(this)"><span class="pc-icon">🎧</span><span class="pc-label">Support</span></div>
            <div class="pc" data-p="ecommerce" data-theme="ecommerce" onclick="selPurpose(this)"><span class="pc-icon">🛒</span><span class="pc-label">Shop</span></div>
            <div class="pc" data-p="community" data-theme="community" onclick="selPurpose(this)"><span class="pc-icon">👥</span><span class="pc-label">Community</span></div>
            <div class="pc" data-p="education" data-theme="education" onclick="selPurpose(this)"><span class="pc-icon">📚</span><span class="pc-label">Education</span></div>
            <div class="pc" data-p="gaming" data-theme="gaming" onclick="selPurpose(this)"><span class="pc-icon">🎮</span><span class="pc-label">Gaming</span></div>
            <div class="pc" data-p="finance" data-theme="finance" onclick="selPurpose(this)"><span class="pc-icon">💰</span><span class="pc-label">Finance</span></div>
            <div class="pc" data-p="general" data-theme="general" onclick="selPurpose(this)" style="grid-column:span 3;"><span class="pc-icon">🤖</span><span class="pc-label">General</span></div>
          </div>
        </div>

        <button class="sb-toggle" id="sb-tog" onclick="toggleSB()"><span class="arr">▶</span> Supabase Config</button>
        <div class="sb-fields" id="sb-fields">
          <div class="field"><label class="field-label">Supabase URL</label><input type="text" class="field-input" id="r-sburl" placeholder="https://xyz.supabase.co"></div>
          <div class="field"><label class="field-label">Anon Key</label><input type="text" class="field-input" id="r-sbkey" placeholder="eyJhbGci..."></div>
        </div>

        <button class="submit" id="r-btn" onclick="doRegister()">Create Account →</button>
        <div class="err-box" id="r-err"></div>
        <div class="spin-wrap" id="r-spin"><div class="dot-spin"></div><div class="dot-spin"></div><div class="dot-spin"></div></div>
      </div>

      <!-- OWNER -->
      <div id="pane-owner" style="display:none;">
        <div class="owner-warn">
          ⚠ Super Owner access — sabhi bots aur admins ka control.<br>
          Default password: <strong>owner2024</strong>
        </div>
        <div class="field">
          <label class="field-label">Owner Password</label>
          <div class="input-wrap">
            <input type="password" class="field-input" id="o-pass" placeholder="••••••••" style="padding-right:24px;" onkeydown="if(event.key==='Enter')doOwner()">
            <button class="eye" onclick="toggleEye('o-pass')">○</button>
          </div>
        </div>
        <div class="field"><label class="field-label">Supabase URL</label><input type="text" class="field-input" id="o-url" placeholder="https://xyz.supabase.co"></div>
        <div class="field"><label class="field-label">Anon Key</label><input type="text" class="field-input" id="o-key" placeholder="eyJhbGci..."></div>
        <button class="submit owner-btn" id="o-btn" onclick="doOwner()">Owner Access →</button>
        <div class="err-box" id="o-err"></div>
        <div class="spin-wrap" id="o-spin"><div class="dot-spin"></div><div class="dot-spin"></div><div class="dot-spin"></div></div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Petals ───────────────────────────────────────────
const canvas = document.querySelector('.bg-canvas');
for(let i=0;i<12;i++){
  const p=document.createElement('div');
  p.className='petal';
  p.style.left=Math.random()*100+'vw';
  p.style.width=p.style.height=(6+Math.random()*6)+'px';
  p.style.animationDuration=(8+Math.random()*12)+'s';
  p.style.animationDelay=(Math.random()*10)+'s';
  p.style.opacity=0;
  canvas.appendChild(p);
}

// ─── Tab ──────────────────────────────────────────────
function switchTab(t){
  ['login','reg','owner'].forEach(x=>{
    document.getElementById('tab-'+x)?.classList?.toggle('active',x===t);
    document.getElementById('pane-'+x).style.display=x===t?'':'none';
  });
}

// ─── Eye toggle ───────────────────────────────────────
function toggleEye(id){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
}

// ─── Purpose ──────────────────────────────────────────
let selP=null,selTheme='general';
function selPurpose(el){
  document.querySelectorAll('.pc').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  selP=el.dataset.p; selTheme=el.dataset.theme;
}

// ─── SB toggle ───────────────────────────────────────
function toggleSB(){
  const tog=document.getElementById('sb-tog');
  const fields=document.getElementById('sb-fields');
  tog.classList.toggle('open');
  fields.classList.toggle('open');
}

// ─── Supabase init ────────────────────────────────────
let SB=null;
function initSB(url,key){
  if(!url||!key)return false;
  try{ SB=supabase.createClient(url,key); localStorage.setItem('sb_url',url); localStorage.setItem('sb_key',key); return true; }
  catch(e){return false;}
}
// restore SB
(()=>{const u=localStorage.getItem('sb_url'),k=localStorage.getItem('sb_key');if(u&&k)initSB(u,k);})();

// ─── Helpers ──────────────────────────────────────────
function showErr(id,msg){const e=document.getElementById(id);e.textContent='✕ '+msg;e.style.display='block';}
function hideErr(id){document.getElementById(id).style.display='none';}
function setBusy(btnId,spinId,busy,label=''){
  const b=document.getElementById(btnId);
  b.disabled=busy; if(!busy&&label)b.textContent=label;
  document.getElementById(spinId).classList.toggle('show',busy);
}
let toastT;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);
}

// ─── LOGIN ────────────────────────────────────────────
async function doLogin(){
  hideErr('l-err');
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass){showErr('l-err','Email aur password dono chahiye');return;}
  const url=localStorage.getItem('sb_url'),key=localStorage.getItem('sb_key');
  if(!url||!key){showErr('l-err','Pehle register karo — Supabase config needed');return;}
  initSB(url,key);
  setBusy('l-btn','l-spin',true);
  try{
    const{data,error}=await SB.auth.signInWithPassword({email,password:pass});
    if(error)throw error;
    const{data:admin}=await SB.from('admins').select('*').eq('auth_id',data.user.id).single();
    if(!admin)throw new Error('Profile nahi mila. Pehle register karo.');
    const session={role:'admin',admin_id:admin.id,auth_id:data.user.id,email:admin.email,name:admin.name,bot_token:admin.bot_token,purpose:admin.purpose||'general',theme:admin.theme||'general',bot_info:admin.bot_info?JSON.parse(admin.bot_info):null};
    localStorage.setItem('bds',JSON.stringify(session));
    window.location.href='dashboard-'+(session.theme||'general')+'.html';
  }catch(e){showErr('l-err',e.message||'Login failed');setBusy('l-btn','l-spin',false,'Enter →');}
}

// ─── REGISTER ─────────────────────────────────────────
async function doRegister(){
  hideErr('r-err');
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  const token=document.getElementById('r-token').value.trim();
  const sburl=document.getElementById('r-sburl').value.trim()||localStorage.getItem('sb_url');
  const sbkey=document.getElementById('r-sbkey').value.trim()||localStorage.getItem('sb_key');
  if(!name||!email||!pass||!token){showErr('r-err','Sabhi fields fill karo');return;}
  if(!selP){showErr('r-err','Bot ka purpose select karo');return;}
  if(!sburl||!sbkey){showErr('r-err','Supabase config toggle karo aur URL+Key dalo');return;}
  if(!initSB(sburl,sbkey)){showErr('r-err','Supabase config invalid');return;}
  setBusy('r-btn','r-spin',true);
  try{
    const botRes=await fetch(`https://api.telegram.org/bot${token}/getMe`).then(r=>r.json());
    if(!botRes.ok)throw new Error('Bot token invalid: '+(botRes.description||'check karo'));
    const botInfo=botRes.result;
    const{data,error}=await SB.auth.signUp({email,password:pass});
    if(error)throw error;
    const{error:dbErr}=await SB.from('admins').insert({auth_id:data.user.id,name,email,bot_token:token,purpose:selP,theme:selTheme,bot_info:JSON.stringify(botInfo),created_at:new Date().toISOString()});
    if(dbErr)throw dbErr;
    const{data:admin}=await SB.from('admins').select('id').eq('auth_id',data.user.id).single();
    const session={role:'admin',admin_id:admin?.id,auth_id:data.user.id,email,name,bot_token:token,purpose:selP,theme:selTheme,bot_info:botInfo};
    localStorage.setItem('bds',JSON.stringify(session));
    toast('Account created! Loading dashboard...');
    setTimeout(()=>window.location.href='dashboard-'+selTheme+'.html',800);
  }catch(e){showErr('r-err',e.message||'Registration failed');setBusy('r-btn','r-spin',false,'Create Account →');}
}

// ─── OWNER ────────────────────────────────────────────
const OWNER_PASS='owner2024';
async function doOwner(){
  hideErr('o-err');
  const pass=document.getElementById('o-pass').value;
  const url=document.getElementById('o-url').value.trim()||localStorage.getItem('sb_url');
  const key=document.getElementById('o-key').value.trim()||localStorage.getItem('sb_key');
  if(pass!==OWNER_PASS){showErr('o-err','Wrong password');return;}
  if(!url||!key){showErr('o-err','Supabase URL aur Key dono chahiye');return;}
  if(!initSB(url,key)){showErr('o-err','Supabase config invalid');return;}
  setBusy('o-btn','o-spin',true);
  const session={role:'owner',name:'Super Owner',theme:'owner'};
  localStorage.setItem('bds',JSON.stringify(session));
  toast('Owner access granted...');
  setTimeout(()=>window.location.href='dashboard-owner.html',600);
}

// ─── Auto-restore session ─────────────────────────────
;(()=>{
  const s=localStorage.getItem('bds');
  if(!s)return;
  try{
    const sess=JSON.parse(s);
    if(sess.role==='owner')window.location.href='dashboard-owner.html';
    else if(sess.bot_token)window.location.href='dashboard-'+(sess.theme||'general')+'.html';
  }catch(e){localStorage.removeItem('bds');}
})();
</script>
</body>
</html>
