<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotDesk — E-Commerce Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ══ SUPPORT THEME — warm amber + dark ink ══ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0d0b;--bg1:#101410;--bg2:#161c14;--bg3:#1c2419;
  --border:#202820;--border2:#283322;
  --acc:#3dc896;--acc2:#56d8a8;--acc-dim:rgba(61,200,150,.1);--acc-glow:rgba(61,200,150,.2);
  --ok:#5cb87a;--ok-dim:rgba(92,184,122,.1);
  --danger:#c95f5f;--danger-dim:rgba(201,95,95,.1);
  --t1:#e4f0eb;--t2:#708a78;--t3:#384840;
  --font:'Zen Kaku Gothic New',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--font);}
/* bg texture */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");
  opacity:.5;}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}

/* TOPBAR */
.topbar{height:48px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;}
.tb-logo{width:28px;height:28px;border-radius:6px;background:var(--acc-dim);border:1px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;}
.tb-title{font-size:13px;font-weight:900;letter-spacing:-.3px;}
.tb-title em{color:var(--acc);font-style:normal;}
.tb-sep{width:1px;height:14px;background:var(--border2);}
.tb-info{font-size:11px;color:var(--t3);font-family:var(--mono);}
.tb-info span{color:var(--t2);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tb-live{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ok);font-family:var(--mono);}
.tb-dot{width:5px;height:5px;border-radius:50%;background:var(--ok);animation:blink 2s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.tb-btn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--t3);font-size:10px;font-family:var(--mono);padding:4px 10px;cursor:pointer;transition:all .15s;}
.tb-btn:hover{border-color:var(--danger);color:var(--danger);}
.hamburger{display:none;background:none;border:1px solid var(--border2);border-radius:4px;color:var(--t2);font-size:16px;padding:2px 7px;cursor:pointer;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:260px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;}
.sb-head{padding:12px;border-bottom:1px solid var(--border);}
.sb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sb-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);font-family:var(--mono);}
.icon-btn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--t3);font-size:11px;padding:3px 8px;cursor:pointer;transition:all .15s;font-family:var(--mono);}
.icon-btn:hover{border-color:var(--acc);color:var(--acc);}
.icon-btn.spinning{animation:spin .5s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.sb-search{position:relative;}
.sb-search input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:7px 10px 7px 26px;font-size:11px;font-family:var(--mono);color:var(--t1);outline:none;transition:border-color .15s;}
.sb-search input:focus{border-color:var(--acc);}
.sb-search input::placeholder{color:var(--t3);}
.sb-search .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--t3);}
.user-list{flex:1;overflow-y:auto;padding:4px 0;}
.user-list::-webkit-scrollbar{width:2px;}
.user-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
.empty-msg{padding:28px 14px;text-align:center;color:var(--t3);font-size:11px;line-height:1.8;font-family:var(--mono);}
.uitem{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:9px;border-left:2px solid transparent;transition:background .1s;}
.uitem:hover{background:var(--bg2);}
.uitem.active{background:var(--bg2);border-left-color:var(--acc);}
.uitem.blocked{opacity:.4;}
.u-av{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;}
.u-meta{flex:1;min-width:0;}
.u-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t2);}
.u-prev{font-size:10px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);}
.u-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.u-tm{font-size:9px;color:var(--t3);font-family:var(--mono);}
.u-bdg{background:var(--acc);color:var(--bg);font-size:9px;font-weight:700;border-radius:99px;padding:1px 6px;}

/* CHAT */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.chat-area::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(var(--border) 1px,transparent 1px);background-size:20px 20px;opacity:.4;}
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3);z-index:1;position:relative;}
.no-chat .nc-icon{font-size:40px;margin-bottom:4px;}
.no-chat h3{font-size:15px;font-weight:700;color:var(--t2);}
.no-chat p{font-size:11px;font-family:var(--mono);}
#chat-view{flex-direction:column;height:100%;display:none;}
.chat-hdr{background:var(--bg1);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:2;position:relative;}
.ch-av{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0;}
.ch-info h2{font-size:13px;font-weight:900;}
.ch-info p{font-size:10px;color:var(--t3);font-family:var(--mono);}
.ch-actions{margin-left:auto;display:flex;gap:6px;}
.ch-btn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--t3);font-size:10px;font-family:var(--mono);padding:4px 10px;cursor:pointer;transition:all .15s;}
.ch-btn:hover{border-color:var(--acc);color:var(--acc);}
.ch-btn.danger:hover{border-color:var(--danger);color:var(--danger);}
.messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:2px;z-index:1;position:relative;}
.messages::-webkit-scrollbar{width:2px;}
.messages::-webkit-scrollbar-thumb{background:var(--border2);}
.date-sep{text-align:center;margin:8px 0 4px;}
.date-sep span{font-size:9px;color:var(--t3);background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:2px 10px;font-family:var(--mono);}
.msg-row{display:flex;align-items:flex-end;gap:6px;animation:popIn .15s ease both;}
@keyframes popIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.msg-row.out{flex-direction:row-reverse;}
.bubble{max-width:66%;padding:8px 12px;border-radius:14px;font-size:12px;line-height:1.55;word-break:break-word;}
.bubble.in{background:var(--bg3);border:1px solid var(--border2);border-bottom-left-radius:3px;color:var(--t1);}
.bubble.out{background:var(--acc);color:var(--bg);border-bottom-right-radius:3px;}
.bt{font-size:9px;opacity:.5;margin-top:4px;display:block;text-align:right;font-family:var(--mono);}
.media-tag{font-size:10px;color:var(--acc);background:var(--acc-dim);border-radius:4px;padding:2px 6px;margin-bottom:3px;display:inline-block;font-family:var(--mono);}
.bubble.out .media-tag{background:rgba(0,0,0,.2);color:var(--bg);}
/* reply bar */
.reply-bar{background:var(--bg1);border-top:1px solid var(--border);padding:10px 16px;flex-shrink:0;z-index:2;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
#msg-ta{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:12px;font-family:var(--mono);color:var(--t1);outline:none;resize:none;max-height:100px;min-height:38px;transition:border-color .15s;line-height:1.5;}
#msg-ta:focus{border-color:var(--acc);}
#msg-ta::placeholder{color:var(--t3);}
#send-btn{width:38px;height:38px;background:var(--acc);border:none;border-radius:8px;color:var(--bg);font-size:15px;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;font-weight:900;}
#send-btn:hover{background:var(--acc2);}
#send-btn:active{transform:scale(.9);}
#send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* RIGHT PANEL */
.rpanel{width:232px;background:var(--bg1);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.rpanel::-webkit-scrollbar{width:2px;}
.rpanel::-webkit-scrollbar-thumb{background:var(--border2);}
.rp-sec{padding:14px;border-bottom:1px solid var(--border);}
.rp-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:11px;font-family:var(--mono);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-c{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:9px;}
.stat-c .sv{font-size:20px;font-weight:900;line-height:1;}
.stat-c .sl{font-size:9px;color:var(--t3);margin-top:2px;font-family:var(--mono);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;}
.tog-label{font-size:11px;color:var(--t2);}
.tog{position:relative;width:32px;height:17px;cursor:pointer;display:inline-block;}
.tog input{opacity:0;width:0;height:0;}
.tog-sl{position:absolute;inset:0;background:var(--bg3);border-radius:99px;transition:.2s;}
.tog-sl::before{content:'';position:absolute;width:11px;height:11px;background:var(--t3);border-radius:50%;top:3px;left:3px;transition:.2s;}
.tog input:checked + .tog-sl{background:var(--acc);}
.tog input:checked + .tog-sl::before{transform:translateX(15px);background:var(--bg);}
.bc-ta{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:8px;font-size:11px;font-family:var(--mono);color:var(--t1);outline:none;resize:none;height:70px;transition:border-color .15s;}
.bc-ta:focus{border-color:var(--acc);}
.bc-ta::placeholder{color:var(--t3);}
.bc-btn{width:100%;background:var(--acc);border:none;border-radius:6px;color:var(--bg);font-family:var(--font);font-size:11px;font-weight:900;padding:8px;cursor:pointer;margin-top:7px;transition:all .15s;}
.bc-btn:hover{background:var(--acc2);}
.bc-btn:disabled{opacity:.4;cursor:not-allowed;}
.bc-res{font-size:10px;border-radius:5px;padding:6px 8px;margin-top:6px;font-family:var(--mono);}
.bc-res.ok{color:var(--ok);background:var(--ok-dim);}
.bc-res.fail{color:var(--danger);background:var(--danger-dim);}
.uic-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.uic-row span:first-child{font-size:9px;color:var(--t3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;}
.uic-row span:last-child{font-size:10px;color:var(--t1);font-weight:700;font-family:var(--mono);}
.log-list{max-height:120px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.log-list::-webkit-scrollbar{width:2px;}
.log-item{font-size:9px;color:var(--t3);padding:3px 6px;background:var(--bg2);border-radius:3px;font-family:var(--mono);}
.log-item.ok{color:var(--ok);}
.log-item.err{color:var(--danger);}
/* toast */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border2);color:var(--t1);font-size:10px;font-family:var(--mono);letter-spacing:1px;padding:8px 16px;border-radius:4px;z-index:9999;transition:transform .3s cubic-bezier(.22,1,.36,1);pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{border-color:var(--danger);color:var(--danger);}
.toast.ok{border-color:var(--ok);color:var(--ok);}
/* mobile */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:48px;bottom:0;z-index:200;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.8);}
  .sidebar.open{transform:none;}
  .rpanel{display:none;}
  .hamburger{display:flex;}
  .tb-info{display:none;}
  .mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;display:none;}
  .mob-overlay.show{display:block;}
  .bubble{max-width:80%;}
}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <button class="hamburger" id="hamburger" onclick="toggleSB()">☰</button>
    <div class="tb-logo">🛒</div>
    <div class="tb-title">Bot<em>Desk</em> <span style="font-size:9px;color:var(--t3);font-family:var(--mono);font-weight:400;">ecommerce</span></div>
    <div class="tb-sep"></div>
    <div class="tb-live"><div class="tb-dot"></div>Live</div>
    <div class="tb-sep"></div>
    <div class="tb-info">Bot: <span id="tb-botname">—</span></div>
    <div class="tb-sep"></div>
    <div class="tb-info">Users: <span id="tb-users">0</span></div>
    <div class="tb-right">
      <button class="tb-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sb-head">
        <div class="sb-top">
          <div class="sb-label">Inbox</div>
          <button class="icon-btn" id="refresh-btn" onclick="fetchUpdates()">⟳</button>
        </div>
        <div class="sb-search">
          <span class="si">🔍</span>
          <input type="text" id="user-search" placeholder="Search users…">
        </div>
      </div>
      <div class="user-list" id="user-list"><div class="empty-msg">Bot connect karo</div></div>
    </aside>
    <div class="mob-overlay" id="mob-overlay" onclick="toggleSB()"></div>
    <div class="chat-area">
      <div class="no-chat" id="no-chat">
        <div class="nc-icon">🛒</div>
        <h3>E-Commerce Dashboard</h3>
        <p>Select a user to reply</p>
      </div>
      <div id="chat-view">
        <div class="chat-hdr">
          <div class="ch-av" id="ch-av"></div>
          <div class="ch-info"><h2 id="ch-name"></h2><p id="ch-sub"></p></div>
          <div class="ch-actions">
            <button class="ch-btn danger" id="block-btn" onclick="toggleBlock()">Block</button>
            <button class="ch-btn danger" onclick="clearChat()">Clear</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="reply-bar">
          <div class="input-row">
            <textarea id="msg-ta" placeholder="Type reply… (Enter = send)" rows="1"></textarea>
            <button id="send-btn" onclick="doSend()">↑</button>
          </div>
        </div>
      </div>
    </div>
    <div class="rpanel">
      <div class="rp-sec">
        <div class="rp-title">Stats</div>
        <div class="stat-grid">
          <div class="stat-c"><div class="sv" id="s-users" style="color:var(--acc)">0</div><div class="sl">users</div></div>
          <div class="stat-c"><div class="sv" id="s-msgs" style="color:#60a5fa">0</div><div class="sl">messages</div></div>
          <div class="stat-c"><div class="sv" id="s-unread" style="color:var(--ok)">0</div><div class="sl">unread</div></div>
          <div class="stat-c"><div class="sv" id="s-sent" style="color:var(--t3)">0</div><div class="sl">sent</div></div>
        </div>
      </div>
      <div class="rp-sec">
        <div class="rp-title">Auto Refresh</div>
        <div class="toggle-row">
          <span class="tog-label">Every 5s</span>
          <label class="tog"><input type="checkbox" id="auto-poll" checked onchange="togglePoll()"><span class="tog-sl"></span></label>
        </div>
      </div>
      <div class="rp-sec" id="user-info-sec" style="display:none;">
        <div class="rp-title">User Info</div>
        <div id="user-info-card"></div>
      </div>
      <div class="rp-sec">
        <div class="rp-title">Broadcast</div>
        <textarea class="bc-ta" id="bc-ta" placeholder="Message to all users…"></textarea>
        <button class="bc-btn" id="bc-btn" onclick="doBroadcast()">Broadcast All</button>
        <div class="bc-res" id="bc-res" style="display:none;"></div>
      </div>
      <div class="rp-sec">
        <div class="rp-title">Activity Log</div>
        <div class="log-list" id="log-list"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
function toggleSB(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('mob-overlay').classList.toggle('show');}
function closeMobileSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mob-overlay').classList.remove('show');}
// Show user info section when chat opens
const _openChat=typeof openChat!=='undefined'?openChat:null;
function openChatHook(cid){openChat(cid);document.getElementById('user-info-sec').style.display='';}
</script>
<script src="dashboard-base.js"></script>
<script>
// override openChat to also show user info section
const _origOpen=openChat;
openChat=function(cid){_origOpen(cid);document.getElementById('user-info-sec').style.display='';};
</script>
</body>
</html>
